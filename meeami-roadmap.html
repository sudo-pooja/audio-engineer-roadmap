<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harsha → Meeami Audio AI Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/*
  UX LAWS APPLIED:
  ─ Aesthetic-Usability Effect: Beautiful interfaces are perceived as easier → warm cream palette, generous whitespace
  ─ Zeigarnik Effect: Incomplete tasks create productive tension → prominent progress bars always visible
  ─ Fitts's Law: Large targets are faster to click → 44px+ checkbox zones, full-row click areas
  ─ Hick's Law: Fewer choices = faster decisions → progressive disclosure (weeks collapse), one CTA per zone
  ─ Law of Proximity: Related items grouped → tasks inside day card, resources in separate section
  ─ Peak-End Rule: Memorable peaks + endings → celebration on week complete, satisfying check animation
  ─ Serial Position Effect: First + last remembered most → today auto-highlighted, deliverable at top of week
  ─ Miller's Law: 7±2 chunks → 7 days per week, max 5 tasks per day
  ─ Jakob's Law: Use familiar patterns → card-based, tab navigation, progress bar shape users already know
  ─ Law of Common Region: Borders define belonging → every day is its own card
*/

:root {
  --bg:        #F7F6F3;
  --bg2:       #EFEDE8;
  --surface:   #FFFFFF;
  --surface2:  #FAFAF8;
  --border:    #E8E3DB;
  --border2:   #D4CEC4;
  --text:      #1C1917;
  --text2:     #44403C;
  --muted:     #78716C;
  --muted2:    #A8A29E;

  --indigo:       #4F46E5;
  --indigo-d:     #3730A3;
  --indigo-light: #EEF2FF;
  --indigo-mid:   #C7D2FE;

  --green:        #059669;
  --green-d:      #047857;
  --green-light:  #D1FAE5;
  --green-mid:    #6EE7B7;

  --amber:        #D97706;
  --amber-light:  #FEF3C7;
  --amber-mid:    #FCD34D;

  --rose:         #E11D48;
  --rose-light:   #FFE4E6;

  --blue:         #2563EB;
  --blue-light:   #DBEAFE;

  --cyan:         #0891B2;
  --cyan-light:   #CFFAFE;

  --purple:       #7C3AED;
  --purple-light: #EDE9FE;

  --r-xs: 6px;
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 18px;

  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.06);

  --transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 6rem;
  min-height: 100vh;
}

/* ══════════════════════════════════════════════
   STICKY HEADER  — always visible, gives context
   Fitts + Zeigarnik: progress bar is never hidden
   ══════════════════════════════════════════════ */
.header {
  position: sticky; top: 0; z-index: 300;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 0 rgba(0,0,0,0.04), var(--shadow-sm);
}
.header-inner {
  max-width: 860px; margin: 0 auto;
  padding: 0.9rem 1.25rem 0;
}
.header-top {
  display: flex; align-items: center; gap: 1rem;
  margin-bottom: 0.75rem; flex-wrap: wrap;
}
.brand {
  display: flex; align-items: center; gap: 0.6rem; flex: 1;
}
.brand-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--indigo), #818CF8);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 0.75rem; font-weight: 800; flex-shrink: 0;
}
.brand-text { min-width: 0; }
.brand-name {
  font-weight: 800; font-size: 0.88rem; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.brand-sub { font-size: 0.68rem; color: var(--muted); margin-top: -1px; }

.header-stats {
  display: flex; gap: 0.5rem; flex-shrink: 0;
}
.stat-pill {
  display: flex; flex-direction: column; align-items: center;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 0.3rem 0.65rem;
  min-width: 48px;
}
.stat-val { font-size: 0.95rem; font-weight: 800; color: var(--text); line-height: 1.2; }
.stat-val.green { color: var(--green); }
.stat-val.amber { color: var(--amber); }
.stat-lbl { font-size: 0.58rem; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }

/* Overall progress bar — Zeigarnik: always visible incomplete state */
.progress-wrap { margin-bottom: 0; }
.progress-label {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 0.3rem;
}
.progress-label span { font-size: 0.7rem; color: var(--muted); font-weight: 600; }
.progress-label strong { font-size: 0.75rem; font-weight: 800; color: var(--indigo); }
.progress-track {
  height: 7px; background: var(--bg2); border-radius: 4px;
  overflow: hidden; position: relative;
}
.progress-fill {
  height: 100%; width: 0%; border-radius: 4px;
  background: linear-gradient(90deg, var(--indigo) 0%, #818CF8 60%, #A5B4FC 100%);
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute; top: 0; right: 0;
  height: 100%; width: 40px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
  animation: shimmer 2s infinite;
}
@keyframes shimmer { 0%,100%{opacity:0} 50%{opacity:1} }

/* Month tabs — Hick's Law: one clear selection at a time */
.month-tabs {
  display: flex; gap: 0.25rem;
  margin-top: 0.75rem; padding: 0 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.month-tabs::-webkit-scrollbar { display: none; }
.month-tab {
  padding: 0.55rem 1.1rem;
  border: none; border-bottom: 2px solid transparent;
  background: transparent; cursor: pointer;
  font-family: inherit; font-size: 0.78rem; font-weight: 600;
  color: var(--muted); white-space: nowrap;
  transition: var(--transition); border-radius: var(--r-xs) var(--r-xs) 0 0;
}
.month-tab:hover { color: var(--text); background: var(--bg); }
.month-tab.active {
  color: var(--indigo);
  border-bottom-color: var(--indigo);
  background: var(--indigo-light);
}

/* ══════════════════════════════════════════════
   MAIN LAYOUT
   ══════════════════════════════════════════════ */
.container { max-width: 860px; margin: 0 auto; padding: 1.5rem 1.25rem; }
.month-section { display: none; }
.month-section.active { display: block; }

/* Month hero card */
.month-hero {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 1.5rem;
  margin-bottom: 1.25rem; box-shadow: var(--shadow-sm);
  display: flex; gap: 1.25rem; align-items: flex-start; flex-wrap: wrap;
}
.month-badge {
  width: 56px; height: 56px; border-radius: 14px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; font-weight: 900;
  background: linear-gradient(135deg, var(--indigo-light) 0%, #C7D2FE 100%);
  color: var(--indigo); box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
}
.month-info { flex: 1; min-width: 200px; }
.month-title { font-size: 1.05rem; font-weight: 800; color: var(--text); }
.month-sub { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }
.month-chips {
  display: flex; gap: 0.4rem; margin-top: 0.9rem; flex-wrap: wrap;
}
.chip {
  display: inline-flex; align-items: center; gap: 0.3rem;
  background: var(--green-light); color: var(--green-d);
  border: 1px solid var(--green-mid); border-radius: 100px;
  padding: 0.22rem 0.7rem; font-size: 0.68rem; font-weight: 700;
}
.chip::before { content: '✓'; }

/* toolbar */
.toolbar {
  display: flex; gap: 0.5rem; margin-bottom: 1rem;
  align-items: center; flex-wrap: wrap;
}
.tool-btn {
  background: var(--surface); border: 1.5px solid var(--border2);
  color: var(--muted); padding: 0.4rem 0.9rem;
  border-radius: 100px; font-size: 0.73rem; font-weight: 600;
  cursor: pointer; transition: var(--transition); font-family: inherit;
}
.tool-btn:hover { border-color: var(--indigo); color: var(--indigo); background: var(--indigo-light); }
.tool-btn.active { background: var(--indigo); border-color: var(--indigo); color: #fff; }
.today-chip {
  margin-left: auto; display: flex; align-items: center; gap: 0.4rem;
  background: var(--amber-light); border: 1.5px solid var(--amber-mid);
  border-radius: 100px; padding: 0.35rem 0.85rem;
  font-size: 0.72rem; font-weight: 600; color: var(--amber);
}
.today-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

/* ══════════════════════════════════════════════
   WEEK CARD  — Law of Common Region, Proximity
   ══════════════════════════════════════════════ */
.week-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--r-lg); margin-bottom: 0.75rem;
  box-shadow: var(--shadow-sm); overflow: hidden;
  transition: box-shadow 0.2s ease, border-color 0.2s ease;
}
.week-card:hover { box-shadow: var(--shadow-md); }
.week-card.complete { border-color: var(--green-mid); }
.week-card.complete .week-header { background: linear-gradient(135deg, #F0FDF4, #D1FAE5); }

/* Week header — Fitts's Law: large click target */
.week-header {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 1rem 1.25rem; cursor: pointer; user-select: none;
  transition: background 0.15s;
  border-radius: var(--r-lg) var(--r-lg) 0 0;
}
.week-card:not(.open) .week-header { border-radius: var(--r-lg); }
.week-header:hover { background: var(--surface2); }
.week-card.open .week-header { border-bottom: 1px solid var(--border); }

.week-badge {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: var(--indigo-light); color: var(--indigo);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.68rem; font-weight: 800; letter-spacing: -0.02em;
}
.week-card.complete .week-badge { background: var(--green-light); color: var(--green-d); }

.week-info { flex: 1; min-width: 0; }
.week-title { font-weight: 700; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.week-goal  { font-size: 0.7rem; color: var(--muted); margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.week-meta { display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; }
.week-pct-bar { display: flex; align-items: center; gap: 0.5rem; }
.mini-track { width: 64px; height: 5px; background: var(--bg2); border-radius: 3px; overflow: hidden; }
.mini-fill  { height: 100%; width: 0%; background: linear-gradient(90deg, var(--green), #34D399); border-radius: 3px; transition: width 0.4s ease; }
.week-card.complete .mini-fill { background: linear-gradient(90deg, var(--green-d), var(--green)); }
.mini-pct { font-size: 0.68rem; font-weight: 700; color: var(--muted); min-width: 2.4em; text-align: right; }
.week-card.complete .mini-pct { color: var(--green-d); }

.chevron { color: var(--muted2); font-size: 0.6rem; transition: transform 0.22s ease; flex-shrink: 0; margin-left: 0.25rem; }
.week-card.open .chevron { transform: rotate(180deg); }

/* Smooth open/close — JS sets explicit heights */
.week-body {
  overflow: hidden;
  height: 0;
  opacity: 0;
  transition: height 0.32s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.22s ease;
  will-change: height, opacity;
}
.week-card.open .week-body {
  opacity: 1;
  transition: height 0.36s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.28s ease 0.06s;
}

/* Month section fade transition */
.month-section {
  display: none;
  animation: fadeSection 0.22s ease;
}
.month-section.active { display: block; }
@keyframes fadeSection {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Challenge body — same smooth animation */
.challenge-body {
  overflow: hidden;
  height: 0;
  opacity: 0;
  transition: height 0.32s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.22s ease;
  will-change: height, opacity;
}
.challenge-wrap.open .challenge-body {
  opacity: 1;
  transition: height 0.36s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.28s ease 0.06s;
}

/* Deliverable — Serial Position Effect: shown first in week body */
.deliverable {
  margin: 1rem 1.25rem 0.75rem;
  padding: 0.75rem 1rem;
  background: var(--indigo-light);
  border-left: 3px solid var(--indigo);
  border-radius: var(--r-xs);
  font-size: 0.77rem; color: var(--indigo-d);
  line-height: 1.55;
}
.deliverable strong { font-weight: 700; }

/* ══════════════════════════════════════════════
   DAY ROW  — Law of Common Region: each day is distinct
   Fitts's Law: full row is the click target
   ══════════════════════════════════════════════ */
.days-wrap { padding: 0 1.25rem 0.25rem; }

.day-card {
  border: 1.5px solid var(--border); border-radius: var(--r-md);
  margin-bottom: 0.5rem; overflow: hidden;
  transition: var(--transition);
  background: var(--surface2);
}
.day-card:hover { border-color: var(--border2); box-shadow: var(--shadow-sm); background: var(--surface); }
.day-card.done { opacity: 0.52; }
.day-card.today-glow { border-color: var(--indigo-mid) !important; background: var(--indigo-light) !important; box-shadow: 0 0 0 3px rgba(79,70,229,0.08) !important; }
.day-card.hidden { display: none; }

.day-inner { display: flex; align-items: flex-start; gap: 0; }

/* Fitts's Law: checkbox zone is 44px wide clickable area */
.day-check-zone {
  width: 52px; flex-shrink: 0; display: flex;
  align-items: flex-start; justify-content: center;
  padding-top: 0.85rem;
  cursor: pointer;
}
.day-check-zone input[type="checkbox"] {
  appearance: none; -webkit-appearance: none;
  width: 20px; height: 20px; border-radius: 6px;
  border: 2px solid var(--border2); cursor: pointer;
  position: relative; transition: var(--transition); flex-shrink: 0;
  background: var(--surface);
}
.day-check-zone input[type="checkbox"]:hover { border-color: var(--green); }
.day-check-zone input[type="checkbox"]:checked {
  background: var(--green); border-color: var(--green);
  animation: checkPop 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes checkPop { 0%{transform:scale(1)} 40%{transform:scale(1.25)} 100%{transform:scale(1)} }
.day-check-zone input[type="checkbox"]:checked::after {
  content: ''; position: absolute;
  left: 5px; top: 2px; width: 6px; height: 10px;
  border: solid #fff; border-width: 0 2.5px 2.5px 0;
  transform: rotate(45deg);
}

.day-content { flex: 1; padding: 0.7rem 1rem 0.75rem 0; min-width: 0; }

.day-header {
  display: flex; align-items: center; gap: 0.5rem;
  margin-bottom: 0.45rem; flex-wrap: wrap;
}
.day-label {
  font-weight: 800; font-size: 0.8rem; color: var(--text);
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 6px; padding: 0.1rem 0.5rem;
  min-width: 3.2em; text-align: center;
}
.day-card.today-glow .day-label {
  background: var(--indigo); color: #fff; border-color: var(--indigo);
}
.day-today-tag {
  font-size: 0.62rem; font-weight: 700; color: var(--indigo);
  background: var(--indigo-light); border: 1px solid var(--indigo-mid);
  border-radius: 100px; padding: 0.08rem 0.45rem;
}

.task-list { display: flex; flex-direction: column; gap: 0.3rem; }

.task-item {
  display: flex; align-items: flex-start; gap: 0.4rem;
  font-size: 0.79rem; color: var(--text2); line-height: 1.55;
}
.day-card.done .task-item { text-decoration: line-through; color: var(--muted2); }

/* Badge — Miller's Law: distinct type labels reduce cognitive load */
.badge {
  display: inline-block; flex-shrink: 0;
  font-size: 0.58rem; font-weight: 800;
  padding: 0.1rem 0.4rem; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.04em;
  margin-top: 0.18rem; white-space: nowrap;
}
.b-watch    { background: #FEE2E2; color: #DC2626; }
.b-code     { background: var(--blue-light); color: var(--blue); }
.b-build    { background: var(--amber-light); color: var(--amber); }
.b-read     { background: var(--cyan-light); color: var(--cyan); }
.b-practice { background: var(--green-light); color: var(--green-d); }
.b-deploy   { background: var(--purple-light); color: var(--purple); }
.b-push     { background: #F3F4F6; color: #6B7280; }
.b-understand { background: #FEF9C3; color: #A16207; }
.b-kaggle   { background: #E0F7FA; color: #0277BD; }

/* ══════════════════════════════════════════════
   RESOURCES — Proximity: visually separated block
   ══════════════════════════════════════════════ */
.resources-wrap {
  margin: 0.5rem 1.25rem 1.25rem;
  border: 1.5px solid var(--border);
  border-radius: var(--r-md); overflow: hidden;
  background: var(--surface);
}
.resources-header {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.65rem 1rem;
  background: var(--bg); border-bottom: 1px solid var(--border);
  font-size: 0.68rem; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.07em;
}
.res-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); }
.res-link {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.7rem 1rem; border-bottom: 1px solid var(--border);
  text-decoration: none; transition: background 0.12s;
}
.res-link:last-child { border-bottom: none; }
.res-link:hover { background: var(--bg); }
.res-icon-wrap {
  width: 34px; height: 34px; border-radius: var(--r-xs); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 800;
}
.ric-yt    { background: #FEE2E2; color: #DC2626; }
.ric-gh    { background: #F1F5F9; color: #334155; }
.ric-kg    { background: #E0F7FA; color: #0277BD; }
.ric-hf    { background: #FFFBEB; color: #D97706; }
.ric-blog  { background: var(--green-light); color: var(--green-d); }
.ric-book  { background: var(--indigo-light); color: var(--indigo); }
.ric-paper { background: var(--rose-light); color: var(--rose); }
.res-text-wrap { min-width: 0; }
.res-label { font-size: 0.77rem; font-weight: 600; color: var(--text); line-height: 1.3; }
.res-sub   { font-size: 0.65rem; color: var(--muted); display: block; margin-top: 0.05rem; }

/* ══════════════════════════════════════════════
   WEEK COMPLETE TOAST  — Peak-End Rule
   ══════════════════════════════════════════════ */
.toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999;
  background: var(--green); color: #fff;
  padding: 0.75rem 1.25rem; border-radius: var(--r-md);
  font-size: 0.82rem; font-weight: 700;
  box-shadow: var(--shadow-lg);
  transform: translateY(120%);
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none; max-width: 280px;
}
.toast.show { transform: translateY(0); }

/* ══════════════════════════════════════════════
   FOOTER
   ══════════════════════════════════════════════ */
.footer {
  text-align: center; padding: 2.5rem 1rem 0;
  border-top: 1px solid var(--border); margin-top: 2rem;
}
.footer-quote {
  font-size: 0.85rem; font-style: italic; color: var(--text2);
  font-weight: 500; margin-bottom: 0.4rem;
}
.footer-credit { font-size: 0.72rem; color: var(--muted2); }

/* ══════════════════════════════════════════════
   WEEKLY CHALLENGE SECTION
   Visual identity: amber — clearly "test zone"
   Testing Effect: answer hidden, revealed on click
   ══════════════════════════════════════════════ */
.challenge-wrap {
  margin: 0 1.25rem 1.25rem;
  border: 2px solid var(--amber-mid);
  border-radius: var(--r-md);
  overflow: hidden;
  background: #FFFDF7;
}
.challenge-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 1rem;
  background: linear-gradient(135deg, #FEF3C7, #FDE68A);
  border-bottom: 1.5px solid var(--amber-mid);
  cursor: pointer; user-select: none;
}
.challenge-header-left {
  display: flex; align-items: center; gap: 0.6rem;
}
.challenge-icon {
  font-size: 1.1rem; line-height: 1;
}
.challenge-title {
  font-size: 0.82rem; font-weight: 800; color: #92400E;
}
.challenge-subtitle {
  font-size: 0.68rem; color: #B45309; margin-top: 0.05rem;
}
.challenge-toggle-btn {
  font-size: 0.68rem; font-weight: 700; color: #92400E;
  background: rgba(255,255,255,0.6); border: 1px solid var(--amber-mid);
  border-radius: 100px; padding: 0.2rem 0.65rem; cursor: pointer;
  transition: var(--transition); font-family: inherit; white-space: nowrap;
}
.challenge-toggle-btn:hover { background: rgba(255,255,255,0.9); }

.challenge-body { display: none; }
.challenge-wrap.open .challenge-body { display: block; }
.challenge-wrap.open .challenge-toggle-btn { content: 'Collapse'; }

/* Build task */
.build-task {
  margin: 1rem 1rem 0.75rem;
  background: var(--surface);
  border: 1.5px solid var(--amber-mid);
  border-radius: var(--r-sm);
  overflow: hidden;
}
.build-task-header {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 0.6rem 0.9rem;
  background: var(--amber-light);
  border-bottom: 1px solid var(--amber-mid);
}
.build-task-label {
  font-size: 0.68rem; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--amber);
}
.build-duration {
  margin-left: auto;
  font-size: 0.65rem; font-weight: 700; color: var(--amber);
  background: rgba(217,119,6,0.1); border: 1px solid var(--amber-mid);
  border-radius: 100px; padding: 0.08rem 0.5rem;
}
.build-task-body { padding: 0.75rem 0.9rem; }
.build-task-text {
  font-size: 0.8rem; color: var(--text2); line-height: 1.65;
}
.build-done-row {
  display: flex; align-items: center; gap: 0.5rem;
  margin-top: 0.75rem; padding-top: 0.65rem;
  border-top: 1px solid var(--border);
}
.build-done-row label {
  display: flex; align-items: center; gap: 0.5rem;
  font-size: 0.75rem; font-weight: 700; color: var(--muted);
  cursor: pointer; user-select: none;
}
.build-done-row input[type="checkbox"] {
  appearance: none; -webkit-appearance: none;
  width: 18px; height: 18px; border-radius: 5px;
  border: 2px solid var(--border2); cursor: pointer;
  position: relative; transition: var(--transition);
  flex-shrink: 0;
}
.build-done-row input[type="checkbox"]:checked {
  background: var(--green); border-color: var(--green);
  animation: checkPop 0.25s cubic-bezier(0.4,0,0.2,1);
}
.build-done-row input[type="checkbox"]:checked::after {
  content: ''; position: absolute;
  left: 4px; top: 1px; width: 6px; height: 10px;
  border: solid #fff; border-width: 0 2.5px 2.5px 0;
  transform: rotate(45deg);
}
.build-done-row input:checked ~ span { color: var(--green-d); }

/* Q&A */
.qa-section { padding: 0 1rem 0.75rem; }
.qa-title {
  font-size: 0.68rem; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.07em;
  margin-bottom: 0.6rem; margin-top: 0.1rem;
  display: flex; align-items: center; gap: 0.4rem;
}
.qa-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 0.5rem;
}
.qa-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--r-sm); overflow: hidden;
  transition: border-color 0.15s;
}
.qa-card:hover { border-color: var(--border2); }
.qa-card.answered { border-color: var(--green-mid); }

.qa-q {
  padding: 0.65rem 0.85rem;
  font-size: 0.78rem; font-weight: 600; color: var(--text);
  line-height: 1.55;
}
.qa-reveal-btn {
  width: 100%; padding: 0.45rem 0.85rem;
  background: var(--bg); border: none; border-top: 1px solid var(--border);
  font-size: 0.68rem; font-weight: 700; color: var(--indigo);
  cursor: pointer; text-align: left; font-family: inherit;
  transition: var(--transition); display: flex; align-items: center; gap: 0.35rem;
}
.qa-reveal-btn:hover { background: var(--indigo-light); }
.qa-card.answered .qa-reveal-btn { color: var(--green-d); background: var(--green-light); border-top-color: var(--green-mid); }

.qa-answer {
  padding: 0.65rem 0.85rem;
  font-size: 0.77rem; color: var(--text2); line-height: 1.6;
  background: var(--surface2);
  border-top: 1px solid var(--border);
  display: none;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.qa-card.revealed .qa-answer { display: block; }
.qa-card.revealed .qa-reveal-btn { display: none; }

/* Pass criteria */
.pass-section {
  margin: 0 1rem 1rem;
  border: 1.5px solid var(--green-mid);
  border-radius: var(--r-sm); overflow: hidden;
  background: var(--surface);
}
.pass-header {
  padding: 0.55rem 0.9rem;
  background: var(--green-light);
  border-bottom: 1px solid var(--green-mid);
  font-size: 0.68rem; font-weight: 800; color: var(--green-d);
  text-transform: uppercase; letter-spacing: 0.07em;
  display: flex; align-items: center; gap: 0.4rem;
}
.pass-list { padding: 0.5rem 0.9rem 0.65rem; display: flex; flex-direction: column; gap: 0.35rem; }
.pass-item {
  display: flex; align-items: flex-start; gap: 0.55rem;
  font-size: 0.78rem; color: var(--text2);
}
.pass-item input[type="checkbox"] {
  appearance: none; -webkit-appearance: none;
  width: 17px; height: 17px; border-radius: 4px; flex-shrink: 0;
  border: 2px solid var(--border2); cursor: pointer;
  position: relative; transition: var(--transition); margin-top: 0.12rem;
}
.pass-item input[type="checkbox"]:checked { background: var(--green); border-color: var(--green); animation: checkPop 0.25s cubic-bezier(0.4,0,0.2,1); }
.pass-item input[type="checkbox"]:checked::after {
  content: ''; position: absolute; left: 3.5px; top: 1px;
  width: 5.5px; height: 9px; border: solid #fff;
  border-width: 0 2.5px 2.5px 0; transform: rotate(45deg);
}
.pass-item.checked { color: var(--muted); text-decoration: line-through; }

/* ══════════════════════════════════════════════
   MOBILE BOTTOM NAV
   Thumb Zone Rule: months reachable from bottom
   Only visible on mobile, hidden on desktop
   ══════════════════════════════════════════════ */
.mobile-bottom-nav {
  display: none; /* hidden on desktop */
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 400;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-top: 1px solid var(--border);
  padding: 0.6rem 1rem 0.6rem;
  padding-bottom: calc(0.6rem + env(safe-area-inset-bottom));
  box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  gap: 0.4rem;
  justify-content: center;
  align-items: center;
}
.mob-month-btn {
  flex: 1; max-width: 100px;
  display: flex; flex-direction: column; align-items: center; gap: 0.15rem;
  padding: 0.5rem 0.5rem 0.4rem;
  border: none; background: transparent; cursor: pointer;
  border-radius: var(--r-sm); transition: var(--transition);
  font-family: inherit; -webkit-tap-highlight-color: transparent;
}
.mob-month-btn:active { background: var(--bg); transform: scale(0.96); }
.mob-month-btn.active { background: var(--indigo-light); }
.mob-month-icon {
  width: 32px; height: 32px; border-radius: 9px;
  background: var(--bg2); border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 800; color: var(--muted);
  transition: var(--transition);
}
.mob-month-btn.active .mob-month-icon {
  background: var(--indigo); border-color: var(--indigo); color: #fff;
}
.mob-month-label {
  font-size: 0.6rem; font-weight: 700; color: var(--muted);
  text-align: center; line-height: 1.2; letter-spacing: 0.02em;
}
.mob-month-btn.active .mob-month-label { color: var(--indigo); }

   RESPONSIVE — Mobile First
   Laws: Touch Target (44px min), Thumb Zone,
         Content First, Progressive Disclosure
   ══════════════════════════════════════════════ */

@media (max-width: 860px) {

/* ─── HELPERS ───────────────────────────────────── */
function tid(w,d,t){return `w${w}d${d}t${t}`;}
function getC(id){return localStorage.getItem(id)==='1';}
function setC(id,v){localStorage.setItem(id,v?'1':'0');}
function todayKey(){return 'streak-'+new Date().toISOString().slice(0,10);}
function markToday(){localStorage.setItem(todayKey(),'1');}

function getTodayDayName(){return DAY_NAMES[new Date().getDay()];}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}

/* ─── RENDER ────────────────────────────────────── */
function renderAll(){
  const tabsEl=document.getElementById('monthTabs');
  const mobNav=document.getElementById('mobileNav');
  const secEl=document.getElementById('monthSections');
  tabsEl.innerHTML=''; secEl.innerHTML='';
  if(mobNav) mobNav.innerHTML='';

  const MONTH_SHORT=['Python\n+DSP','Audio\nAI Core','Edge\n+Job'];

  DATA.forEach((month,mIdx)=>{
    /* desktop tab */
    const tab=document.createElement('button');
    tab.className='month-tab'+(mIdx===0?' active':'');
    tab.role='tab';
    tab.textContent=`Month ${month.month}`;
    tab.setAttribute('aria-label',month.title);
    tab.onclick=()=>switchMonth(mIdx);
    tabsEl.appendChild(tab);

    /* mobile bottom nav button — Thumb Zone Rule */
    if(mobNav){
      const mb=document.createElement('button');
      mb.className='mob-month-btn'+(mIdx===0?' active':'');
      mb.setAttribute('aria-label',`Month ${month.month}: ${month.title}`);
      mb.innerHTML=`
        <div class="mob-month-icon">${month.month}</div>
        <span class="mob-month-label">${MONTH_SHORT[mIdx]||'Month '+month.month}</span>`;
      mb.onclick=()=>switchMonth(mIdx);
      mobNav.appendChild(mb);
    }

    /* section */
    const sec=document.createElement('div');
    sec.className='month-section'+(mIdx===0?' active':'');
    sec.id=`m${mIdx}`;

    /* toolbar */
    const todayName=getTodayDayName();
    sec.innerHTML=`
      <div class="toolbar">
        <button class="tool-btn" onclick="toggleFocus()">Hide done</button>
        <button class="tool-btn" onclick="expandAll()">Expand all</button>
        <button class="tool-btn" onclick="collapseAll()">Collapse all</button>
        <div class="today-chip"><span class="dot"></span>Today is ${todayName}</div>
      </div>
      <div class="month-hero">
        <div class="month-badge">${month.month}</div>
        <div class="month-info">
          <div class="month-title">${month.title}</div>
          <div class="month-sub">${month.sub}</div>
          <div class="month-chips">${month.milestones.map(m=>`<span class="chip">${m}</span>`).join('')}</div>
        </div>
      </div>`;

    /* weeks */
    month.weeks.forEach(week=>{
      const {totalT,doneT}=weekStats(week);
      const pct=totalT?Math.round(doneT/totalT*100):0;
      const complete=pct===100;

      const card=document.createElement('div');
      card.className='week-card'+(complete?' complete':'');
      card.id=`wk${week.num}`;

      card.innerHTML=`
        <div class="week-header" onclick="toggleWeek(${week.num})" role="button" aria-expanded="false">
          <div class="week-badge">${complete?'✓':'W'+week.num}</div>
          <div class="week-info">
            <div class="week-title">${week.title}</div>
            <div class="week-goal">${week.goal}</div>

          <div class="week-meta">
            <div class="week-pct-bar">

            </div>

        </div>
        <div class="week-body">
          <div class="deliverable"><strong>📦 Week Deliverable:</strong> ${week.deliverable}</div>
          <div class="days-wrap" id="dw${week.num}"></div>
          <div class="resources-wrap">
            <div class="resources-header">📚 Resources for this week</div>
            <div class="res-grid">
              ${week.resources.map(r=>`
                <a class="res-link" href="${r.url}" target="_blank" rel="noopener noreferrer">
                  <div class="res-icon-wrap ${RC[r.type]}">${RI[r.type]}</div>
                  <div class="res-text-wrap">
                    <div class="res-label">${r.label}</div>
                    <span class="res-sub">${r.sub}</span>
                  </div>

      sec.appendChild(card);

      /* challenge — appended after resources inside week-body */

      week.days.forEach((day,di)=>{
        const allDone=day.tasks.every((_,ti)=>getC(tid(week.num,di,ti)));
        const isToday=day.label===todayStr;

        const dc=document.createElement('div');
        dc.className='day-card'+(allDone?' done':'')+(isToday?' today-glow':'');

    secEl.appendChild(sec);
  });

  /* auto-open current week (Serial Position Effect: surface what's now) */
  autoOpenCurrentWeek();
  updateStats();
  setDailyQuote();

function autoOpenCurrentWeek(){
  for(const month of DATA){
    for(const week of month.weeks){
      const {totalT,doneT}=weekStats(week);
      if(doneT<totalT){
        const mIdx=DATA.findIndex(m=>m.weeks.some(w=>w.num===week.num));
        if(mIdx>=0) switchMonth(mIdx);
        const card=document.getElementById(`wk${week.num}`);
        if(card){
          /* use smooth JS animation — not classList toggle */
          card.classList.add('open');
          const body=card.querySelector('.week-body');
          const hdr=card.querySelector('.week-header');
          if(body){
            body.style.height='auto';
            const h=body.scrollHeight;
            body.style.height='0';
            requestAnimationFrame(()=>{
              body.style.height=h+'px';
              setTimeout(()=>{ if(card.classList.contains('open')) body.style.height='auto'; },380);
            });
          }
          if(hdr) hdr.setAttribute('aria-expanded','true');
          /* Scroll to the week card after a brief delay */
          setTimeout(()=>{
            card.scrollIntoView({behavior:'smooth',block:'start'});
          },120);
        }
        return;
      }
    }
  }
}

/* ─── INTERACTIONS ──────────────────────────────── */
function toggleWeek(n){
  const card=document.getElementById(`wk${n}`);
  const body=card.querySelector('.week-body');
  const hdr=card.querySelector('.week-header');
  const isOpen=card.classList.contains('open');

  if(!isOpen){
    /* Opening: measure full height then animate to it */
    card.classList.add('open');
    body.style.height='auto';
    const h=body.scrollHeight;
    body.style.height='0';
    requestAnimationFrame(()=>{
      body.style.height=h+'px';
      /* After transition, let it be 'auto' so content can grow */
      setTimeout(()=>{ if(card.classList.contains('open')) body.style.height='auto'; },380);
    });
    if(hdr) hdr.setAttribute('aria-expanded','true');
  } else {
    /* Closing: lock current height, then animate to 0 */
    body.style.height=body.scrollHeight+'px';
    requestAnimationFrame(()=>{
      body.style.height='0';
    });
    setTimeout(()=>{ card.classList.remove('open'); },340);
    if(hdr) hdr.setAttribute('aria-expanded','false');
  }
}

    const el=document.getElementById(`ti${wn}_${di}_${ti}`);
    if(el)el.style.cssText=checked?'text-decoration:line-through;opacity:0.5':'';
  });
  const dc=document.getElementById(`dc${wn}_${di}`);
  if(dc){
    dc.classList.toggle('done',checked);
    if(focusMode&&checked)dc.classList.add('hidden');
  }
  updateWeekPct(wn);
  updateStats();
  markToday();
  /* Peak-End Rule: celebrate week completion */
  const {totalT,doneT}=weekStats(week);
  if(doneT===totalT&&checked) showToast('🎉 Week '+wn+' complete! You earned it.');
}

function updateWeekPct(wn){
  const week=DATA.flatMap(m=>m.weeks).find(w=>w.num===wn);
  const {totalT,doneT}=weekStats(week);
  const pct=totalT?Math.round(doneT/totalT*100):0;
  const complete=pct===100;
  const card=document.getElementById(`wk${wn}`);
  if(card)card.classList.toggle('complete',complete);
  const f=document.getElementById(`wf${wn}`); if(f)f.style.width=pct+'%';
  const p=document.getElementById(`wp${wn}`); if(p){p.textContent=pct+'%'; p.style.color=complete?'var(--green-d)':'var(--muted)';}
  const badge=card&&card.querySelector('.week-badge'); if(badge)badge.textContent=complete?'✓':'W'+wn;
}

function weekStats(week){
  let totalT=0,doneT=0;
  week.days.forEach((d,di)=>d.tasks.forEach((_,ti)=>{totalT++;if(getC(tid(week.num,di,ti)))doneT++;}));
  return{totalT,doneT};
}

function updateStats(){
  let total=0,done=0;
  DATA.forEach(m=>m.weeks.forEach(w=>{const{totalT,doneT}=weekStats(w);total+=totalT;done+=doneT;}));
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pctFill').style.width=pct+'%';
  document.getElementById('pctLabel').textContent=pct+'%';
  document.getElementById('sDone').textContent=done;
  document.getElementById('sLeft').textContent=total-done;
  /* streak */
  let streak=0;
  const today=new Date(); today.setHours(0,0,0,0);
  for(let i=0;i<90;i++){
    const d=new Date(today); d.setDate(d.getDate()-i);
    if(localStorage.getItem('streak-'+d.toISOString().slice(0,10))==='1')streak++;
    else if(i>0)break;
  }
  document.getElementById('sStreak').textContent=streak+'🔥';
}

function toggleFocus(){
  focusMode=!focusMode;
  document.querySelectorAll('.tool-btn').forEach(b=>{
    if(b.textContent==='Hide done'||b.textContent==='Show done'){
      b.textContent=focusMode?'Show done':'Hide done';
      b.classList.toggle('active',focusMode);
    }
  });
  document.querySelectorAll('.day-card').forEach(dc=>{
    if(dc.classList.contains('done'))dc.classList.toggle('hidden',focusMode);
  });
}

function expandAll(){
  document.querySelectorAll('.week-card').forEach(c=>{
    if(c.classList.contains('open')) return;
    c.classList.add('open');
    const body=c.querySelector('.week-body');
    if(body){
      body.style.height='auto';
      const h=body.scrollHeight;
      body.style.height='0';
      requestAnimationFrame(()=>{
        body.style.height=h+'px';
        setTimeout(()=>{ if(c.classList.contains('open')) body.style.height='auto'; },380);
      });
    }
    const hdr=c.querySelector('.week-header'); if(hdr)hdr.setAttribute('aria-expanded','true');
  });
}
function collapseAll(){
  document.querySelectorAll('.week-card').forEach(c=>{
    if(!c.classList.contains('open')) return;
    const body=c.querySelector('.week-body');
    if(body){ body.style.height=body.scrollHeight+'px'; requestAnimationFrame(()=>{ body.style.height='0'; }); }
    setTimeout(()=>{ c.classList.remove('open'); },340);
    const hdr=c.querySelector('.week-header'); if(hdr)hdr.setAttribute('aria-expanded','false');
  });
}

function switchMonth(idx){
  document.querySelectorAll('.month-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.mob-month-btn').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.month-section').forEach((s,i)=>s.classList.toggle('active',i===idx));
  /* Scroll to top of content smoothly on mobile */
  if(window.innerWidth<=680){
    window.scrollTo({top:0,behavior:'smooth'});
  }
}

function setDailyQuote(){
  const day=new Date().getDay();
  const el=document.getElementById('dailyQuote');
  if(el)el.textContent='"'+QUOTES[day%QUOTES.length]+'"';
}

/* ─── CHALLENGE RENDERING ────────────────────────── */
function renderChallenge(weekNum, parentEl) {
  const ch = CHALLENGES[weekNum];
  if (!ch) return;

  const wrap = document.createElement('div');
  wrap.className = 'challenge-wrap';
  wrap.id = `ch${weekNum}`;

  const completedBuild = localStorage.getItem(`chbuild-${weekNum}`) === '1';
  const passCount = ch.pass.filter((_,i) => localStorage.getItem(`chpass-${weekNum}-${i}`) === '1').length;
  const allPassed = passCount === ch.pass.length;

  wrap.innerHTML = `
    <div class="challenge-header" onclick="toggleChallenge(${weekNum})">
      <div class="challenge-header-left">
        <span class="challenge-icon">🧪</span>
        <div>
          <div class="challenge-title">Week ${weekNum} Challenge — Test Your Understanding</div>
          <div class="challenge-subtitle">Build It · Explain It · Pass It — do this before moving to Week ${weekNum+1}</div>
        </div>
      </div>
      <button class="challenge-toggle-btn" id="chtbtn${weekNum}">Open Challenge</button>
    </div>
    <div class="challenge-body">

      <div class="build-task">
        <div class="build-task-header">
          <span class="build-task-label">🔨 Part 1 — Build It From Scratch</span>
          <span class="build-duration">⏱ ${ch.duration}</span>
        </div>
        <div class="build-task-body">
          <div class="build-task-text">${ch.task}</div>
          <div class="build-done-row">
            <label for="cbbuild${weekNum}">
              <input type="checkbox" id="cbbuild${weekNum}"
                ${completedBuild ? 'checked' : ''}
                onchange="saveBuildDone(${weekNum}, this.checked)">
              <span>I built this from scratch without looking anything up ✓</span>
            </label>
          </div>
        </div>
      </div>

      <div class="qa-section">
        <div class="qa-title">💬 Part 2 — Explain It (say answer out loud, then reveal)</div>
        <div class="qa-grid">
          ${ch.qa.map((item, qi) => {
            const revealed = localStorage.getItem(`chqa-${weekNum}-${qi}`) === '1';
            return `<div class="qa-card${revealed?' revealed answered':''}" id="qacard${weekNum}_${qi}">
              <div class="qa-q">${item.q}</div>
              ${revealed
                ? `<div class="qa-answer">${item.a}</div>`
                : `<button class="qa-reveal-btn" onclick="revealQA(${weekNum},${qi})">👁 Say it first, then reveal</button>`
              }
            </div>`;
          }).join('')}
        </div>
      </div>

      <div class="pass-section">
        <div class="pass-header">✅ Part 3 — Pass Criteria (only check when truly true)</div>
        <div class="pass-list">
          ${ch.pass.map((item, pi) => {
            const checked = localStorage.getItem(`chpass-${weekNum}-${pi}`) === '1';
            return `<label class="pass-item${checked?' checked':''}" id="passitem${weekNum}_${pi}">
              <input type="checkbox" ${checked?'checked':''}
                onchange="savePass(${weekNum},${pi},this.checked)">
              ${item}
            </label>`;
          }).join('')}
        </div>
      </div>

    </div>`;

  parentEl.appendChild(wrap);
}

function toggleChallenge(n) {
  const wrap=document.getElementById(`ch${n}`);
  const body=wrap.querySelector('.challenge-body');
  const btn=document.getElementById(`chtbtn${n}`);
  const isOpen=wrap.classList.contains('open');

  if(!isOpen){
    wrap.classList.add('open');
    body.style.height='auto';
    const h=body.scrollHeight;
    body.style.height='0';
    requestAnimationFrame(()=>{
      body.style.height=h+'px';
      setTimeout(()=>{ if(wrap.classList.contains('open')) body.style.height='auto'; },380);
    });
    if(btn) btn.textContent='Collapse';
  } else {
    body.style.height=body.scrollHeight+'px';
    requestAnimationFrame(()=>{ body.style.height='0'; });
    setTimeout(()=>{ wrap.classList.remove('open'); },340);
    if(btn) btn.textContent='Open Challenge';
  }
}

function revealQA(weekNum, qi) {
  const card = document.getElementById(`qacard${weekNum}_${qi}`);
  if (!card) return;
  const ch = CHALLENGES[weekNum];
  card.classList.add('revealed', 'answered');
  card.innerHTML = `<div class="qa-q">${ch.qa[qi].q}</div><div class="qa-answer">${ch.qa[qi].a}</div>`;
  localStorage.setItem(`chqa-${weekNum}-${qi}`, '1');
}

function saveBuildDone(weekNum, val) {
  localStorage.setItem(`chbuild-${weekNum}`, val ? '1' : '0');
  markToday();
}

function savePass(weekNum, pi, val) {
  localStorage.setItem(`chpass-${weekNum}-${pi}`, val ? '1' : '0');
  const item = document.getElementById(`passitem${weekNum}_${pi}`);
  if (item) item.classList.toggle('checked', val);
  /* celebrate if all pass items checked */
  const ch = CHALLENGES[weekNum];
  const allDone = ch.pass.every((_,i) => localStorage.getItem(`chpass-${weekNum}-${i}`) === '1');
  if (allDone && val) showToast('🏆 Week ' + weekNum + ' challenge passed! You are ready to move on.');
  markToday();
}

/* ─── HOOK CHALLENGE INTO WEEK RENDER ────────────── */
// Patch renderAll to append challenge after resources in each week body
const _origRenderAll = renderAll;
// Override is done inline — challenge is appended after resources via renderChallenge call

/* Persist streak on any interaction */
document.addEventListener('change',()=>{markToday();updateStats();});

/* ─── BOOT ──────────────────────────────────────── */
renderAll();
</script>
